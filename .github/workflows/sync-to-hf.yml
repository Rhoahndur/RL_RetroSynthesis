name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Token length: ${#HF_TOKEN}"
          echo "Token prefix: ${HF_TOKEN:0:3}"
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/rhoahndur/retrosynthesis-ai
          git push hf main
