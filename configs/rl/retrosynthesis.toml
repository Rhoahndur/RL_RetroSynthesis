# Quick validation run — small model, few steps
model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 50
batch_size = 64
rollouts_per_example = 4

[sampling]
max_tokens = 256

[[env]]
id = "retrosynthesis"
args = { split = "train", difficulty = "all" }

[val]
interval = 10
num_examples = 10
rollouts_per_example = 2

[checkpoints]
interval = 25
keep_cloud = 3
