# Full training run — larger model, more steps, eval, wandb
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 300
batch_size = 256
rollouts_per_example = 16
learning_rate = 1e-4

[sampling]
max_tokens = 512

[[env]]
id = "retrosynthesis"
args = { split = "train", difficulty = "all" }

[val]
interval = 25
num_examples = 20
rollouts_per_example = 4

[eval]
interval = 100
eval_base_model = true
num_examples = 30
rollouts_per_example = 4

[[eval.env]]
id = "retrosynthesis"
args = { split = "test" }

[checkpoints]
interval = 50
keep_cloud = 5

[adapters]
interval = 100
keep_last = 3

[wandb]
project = "retrosyn-rl"
name = "full-run"
