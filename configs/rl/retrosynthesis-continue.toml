# Continue training from step 50 checkpoint, run to 250
model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 250
batch_size = 64
rollouts_per_example = 4


[sampling]
max_tokens = 256

[[env]]
id = "rhoahndur/retrosynthesis"
args = { split = "train", difficulty = "all" }

[val]
interval = 25
num_examples = 10
rollouts_per_example = 2

[checkpoints]
interval = 50
keep_cloud = 5

[adapters]
interval = 50
keep_last = 5
